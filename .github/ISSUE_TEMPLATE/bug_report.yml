name: Bug Report
description: Report a bug in AgentCTL
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the information below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Start the control plane with `pnpm dev:control`
        2. Navigate to '...'
        3. Click on '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g., macOS 15.2, Ubuntu 24.04"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js Version
      placeholder: "e.g., 20.11.0"
    validations:
      required: true
  - type: input
    id: pnpm
    attributes:
      label: pnpm Version
      placeholder: "e.g., 8.15.4"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Any relevant log output or screenshots.
    validations:
      required: false
