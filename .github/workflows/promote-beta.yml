# Promote to Beta (Section 12.6)
#
# Runs scripts/env-promote.sh on the beta deployment host once that host is
# registered as a GitHub Actions self-hosted runner.
#
# Current status:
#   - the GitHub Environment approval path stays in place
#   - the workflow fails fast until BETA_SELF_HOSTED_RUNNER_READY=true
#   - zero-side-effect host readiness checks run before approval on the
#     dedicated self-hosted runner
#   - until then, operators must continue using:
#       ./scripts/env-promote.sh --from dev-1
#       ./scripts/env-promote.sh --from dev-2
#
# NOTE: The "beta" GitHub Environment MUST be configured with required
# reviewers to gate beta promotions after readiness passes. Go to:
#   Settings > Environments > beta > Required reviewers
#
# Required repository variables (non-secret):
#   BETA_SELF_HOSTED_RUNNER_READY — set to true only after the beta deployment
#                                   host is registered as a self-hosted runner
#                                   with the dedicated `agentctl-beta` label
#
# The workflow intentionally does not pretend that scripts/env-promote.sh can
# run correctly on GitHub-hosted runners because the script assumes local tier
# files, PM2, and beta-host state.

name: Promote to Beta

on:
  workflow_dispatch:
    inputs:
      source_tier:
        description: "Explicitly select the dev tier to promote into beta"
        required: true
        type: choice
        options:
          - select-source-tier
          - dev-1
          - dev-2
        default: select-source-tier
      dry_run:
        description: "Show promotion plan without executing"
        required: false
        type: boolean
        default: false

concurrency:
  group: promote-beta
  cancel-in-progress: false

env:
  PNPM_VERSION: "8.15.4"
  PRIMARY_NODE: "22"

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Preflight — require an explicit dev tier and a ready self-hosted runner
  # before the beta approval gate
  # ---------------------------------------------------------------------------
  validate-inputs:
    name: Validate promotion request and runner readiness
    runs-on: ubuntu-latest

    outputs:
      source_tier: ${{ steps.validate.outputs.source_tier }}

    steps:
      - name: Validate source tier selection
        id: validate
        run: |
          case "${{ inputs.source_tier }}" in
            dev-1|dev-2)
              echo "source_tier=${{ inputs.source_tier }}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Select dev-1 or dev-2 before requesting a beta promotion. The default placeholder is intentionally invalid."
              exit 1
              ;;
          esac

      - name: Validate beta self-hosted runner readiness
        env:
          BETA_SELF_HOSTED_RUNNER_READY: ${{ vars.BETA_SELF_HOSTED_RUNNER_READY }}
        run: |
          set -euo pipefail

          if [ "${BETA_SELF_HOSTED_RUNNER_READY:-false}" != "true" ]; then
            {
              echo "### Beta promotion is intentionally gated"
              echo
              echo "This workflow only becomes live after the beta deployment host is registered as a GitHub Actions self-hosted runner with the dedicated \`agentctl-beta\` label and the repository variable \`BETA_SELF_HOSTED_RUNNER_READY\` is set to \`true\`."
              echo
              echo "- Current supported path: \`./scripts/env-promote.sh --from dev-1\`"
              echo "- Alternate source tier: \`./scripts/env-promote.sh --from dev-2\`"
              echo "- Next infra step: register the beta deployment host as the self-hosted runner for this workflow with the \`agentctl-beta\` label, then set \`BETA_SELF_HOSTED_RUNNER_READY=true\`"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Beta promotion via GitHub Actions is disabled until the beta deployment host is registered as a self-hosted runner with the agentctl-beta label and repository variable BETA_SELF_HOSTED_RUNNER_READY=true. Until then, run ./scripts/env-promote.sh --from dev-1 or ./scripts/env-promote.sh --from dev-2 locally on the beta host."
            exit 1
          fi

          {
            echo "### Beta runner readiness confirmed"
            echo
            echo "- BETA_SELF_HOSTED_RUNNER_READY=true"
            echo "- The next job will request beta environment approval before dispatching onto the self-hosted runner labeled \`agentctl-beta\`."
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Beta host verification — zero-side-effect checks on the dedicated runner
  # before consuming the beta environment approval gate
  # ---------------------------------------------------------------------------
  verify-beta-host:
    name: Verify beta host readiness
    runs-on:
      - self-hosted
      - agentctl-beta
    needs: validate-inputs

    steps:
      # Preserve local .env.* files on the beta host worktree.
      - uses: actions/checkout@v5
        with:
          clean: false
          fetch-depth: 0

      - name: Verify local beta promotion prerequisites
        run: |
          set -euo pipefail

          missing=()
          for path in ".env.${{ needs.validate-inputs.outputs.source_tier }}" ".env.beta" "infra/pm2/ecosystem.beta.config.cjs" "scripts/env-promote.sh"; do
            if [ ! -f "$path" ]; then
              missing+=("$path")
            fi
          done

          if ! git describe --exact-match HEAD >/dev/null 2>&1; then
            missing+=("exact version tag at HEAD (run ./scripts/version-bump.sh first)")
          fi

          for env_file in ".env.${{ needs.validate-inputs.outputs.source_tier }}" ".env.beta"; do
            if [ -f "$env_file" ] && ! grep -Eq '^DATABASE_URL=.+' "$env_file"; then
              missing+=("$env_file with non-empty DATABASE_URL")
            fi
          done

          for bin in git pnpm pm2 curl flock python3 psql; do
            if ! command -v "$bin" >/dev/null 2>&1; then
              missing+=("$bin (binary)")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            missing_csv="$(printf '%s, ' "${missing[@]}")"
            missing_csv="${missing_csv%, }"
            echo "::error::Self-hosted runner '${{ runner.name }}' is missing zero-side-effect beta promotion prerequisites: $missing_csv. Approval is intentionally blocked until the agentctl-beta runner mirrors the beta deployment host assumptions used by scripts/env-promote.sh. Until then, keep using ./scripts/env-promote.sh --from dev-1 or ./scripts/env-promote.sh --from dev-2 locally on the beta host."
            exit 1
          fi

          {
            echo "### Beta host readiness confirmed"
            echo
            echo "- Source tier: \`${{ needs.validate-inputs.outputs.source_tier }}\`"
            echo "- Runner: \`${{ runner.name }}\`"
            echo "- Dry run: \`${{ inputs.dry_run }}\`"
            echo "- Zero-side-effect checks passed before approval"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Approval — preserve the beta environment gate after readiness passes
  # ---------------------------------------------------------------------------
  await-beta-approval:
    name: Await beta approval
    runs-on: ubuntu-latest
    needs:
      - validate-inputs
      - verify-beta-host
    environment: beta

    steps:
      - name: Record approved request
        run: |
          {
            echo "### Beta approval granted"
            echo
            echo "- Source tier: \`${{ needs.validate-inputs.outputs.source_tier }}\`"
            echo "- Dry run: \`${{ inputs.dry_run }}\`"
            echo "- Execution target: self-hosted runner labeled \`agentctl-beta\` on the beta deployment host"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Promote — run env-promote.sh locally on the beta self-hosted runner
  # ---------------------------------------------------------------------------
  promote:
    name: Promote ${{ needs.validate-inputs.outputs.source_tier }} to beta
    runs-on:
      - self-hosted
      - agentctl-beta
    timeout-minutes: 20
    needs:
      - validate-inputs
      - await-beta-approval

    steps:
      # Preserve local .env.* files on the beta host worktree.
      - uses: actions/checkout@v5
        with:
          clean: false
          fetch-depth: 0

      # ── Setup Node.js + pnpm ───────────────────────────────────────────
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.PRIMARY_NODE }}
          cache: pnpm

      - name: Install dependencies
        if: inputs.dry_run == false
        run: pnpm install --frozen-lockfile

      # ── Run env-promote.sh ─────────────────────────────────────────────
      - name: Run promotion script
        id: promote
        run: |
          set -euo pipefail

          promote_args=(--from "${{ needs.validate-inputs.outputs.source_tier }}")
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            promote_args+=(--dry-run)
          fi

          echo "Promoting from tier: ${{ needs.validate-inputs.outputs.source_tier }}"
          echo "Dry run: ${{ inputs.dry_run }}"
          echo "Runner: ${{ runner.name }}"
          echo ""

          chmod +x scripts/env-promote.sh
          ./scripts/env-promote.sh "${promote_args[@]}"

      # ── Post-promote health check ──────────────────────────────────────
      - name: Health check (beta)
        if: inputs.dry_run == false
        id: health
        run: |
          set -euo pipefail

          ATTEMPT=0
          MAX_ATTEMPTS=5
          INTERVAL=10

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Health check attempt $ATTEMPT/$MAX_ATTEMPTS..."

            STATUS="$(curl -sf -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/health || echo "000")"

            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP $STATUS)"
              echo "healthy=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Health check returned HTTP $STATUS, retrying in ${INTERVAL}s..."
            sleep $INTERVAL
          done

          echo "healthy=false" >> "$GITHUB_OUTPUT"
          echo "::error::Local beta health check failed after $MAX_ATTEMPTS attempts on self-hosted runner '${{ runner.name }}'"
          exit 1

      # ── Write job summary ──────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          echo "## Promote to Beta" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Source tier | \`${{ needs.validate-inputs.outputs.source_tier }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dry run | \`${{ inputs.dry_run }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Triggered by | \`${{ github.actor }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Runner | \`${{ runner.name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Execution mode | \`self-hosted local env-promote.sh\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

      # ── Report promotion failure ───────────────────────────────────────
      - name: Report promotion failure
        if: failure()
        run: |
          echo "::error title=Beta Promotion Failed::Promotion of tier '${{ needs.validate-inputs.outputs.source_tier || inputs.source_tier }}' failed on self-hosted runner '${{ runner.name }}'. scripts/env-promote.sh owns any state-changing rollback inside the beta host workflow itself. If this runner is not actually the beta deployment host labeled agentctl-beta, disable BETA_SELF_HOSTED_RUNNER_READY and keep using ./scripts/env-promote.sh --from dev-1 or ./scripts/env-promote.sh --from dev-2 locally."
