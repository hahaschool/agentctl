# Phase 9.2 — Automated Security Pipeline
# Runs CodeQL, Semgrep, dependency audit, secret scanning, and container scanning
# on every push/PR to main/dev and nightly at 03:00 UTC.

name: Security Audit

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    # Nightly at 03:00 UTC
    - cron: '0 3 * * *'

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write

jobs:
  # ── CodeQL static analysis ──────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL analysis
        continue-on-error: true
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:javascript-typescript

  # ── Semgrep SAST ────────────────────────────────────────────────
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 15

    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run Semgrep
        run: semgrep scan --config p/security-audit --config p/secrets --sarif --output semgrep-results.sarif .
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

  # ── Dependency audit + license check ────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies (fail on high/critical)
        run: pnpm audit --audit-level=high

      - name: Check licenses for GPL/AGPL
        run: |
          pnpm licenses list --json > licenses.json

          # Scan for GPL or AGPL licenses (excluding LGPL which is permissive)
          # PM2 (AGPL-3.0) is excluded: used as external process manager, not embedded/linked
          VIOLATIONS=$(cat licenses.json | \
            node -e "
              const data = require('fs').readFileSync('/dev/stdin', 'utf8');
              const parsed = JSON.parse(data);
              const EXCLUDED = ['pm2', '@pm2/agent', '@pm2/io', '@pm2/js-api', '@pm2/pm2-version-check'];
              const violations = [];
              const isCopyleftLicense = (value) => {
                const upper = value.toUpperCase();
                return (upper.includes('GPL') || upper.includes('AGPL')) && !upper.includes('LGPL');
              };
              for (const [license, packages] of Object.entries(parsed)) {
                const alternatives = license
                  .replace(/[()]/g, '')
                  .split(/\s+OR\s+/i)
                  .map((value) => value.trim())
                  .filter(Boolean);
                const onlyCopyleftOptions =
                  alternatives.length > 0 && alternatives.every(isCopyleftLicense);

                if (onlyCopyleftOptions) {
                  for (const pkg of packages) {
                    if (!EXCLUDED.includes(pkg.name)) {
                      violations.push(pkg.name + '@' + pkg.version + ' (' + license + ')');
                    }
                  }
                }
              }
              if (violations.length > 0) {
                console.error('GPL/AGPL license violations found:');
                violations.forEach(v => console.error('  - ' + v));
                process.exit(1);
              }
              console.log('No GPL/AGPL license violations found.');
            ")

  # ── Secret scanning ─────────────────────────────────────────────
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_VERSION: "8.30.0"
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C "$RUNNER_TEMP" gitleaks
          chmod +x "$RUNNER_TEMP/gitleaks"
          export PATH="$RUNNER_TEMP:$PATH"

          args=(
            detect
            --redact
            -v
            --exit-code=1
            --report-format=sarif
            --report-path=results.sarif
            --log-level=debug
          )

          event_name="${{ github.event_name }}"
          if [ "$event_name" = "push" ]; then
            commit_count="$(jq '.commits | length' "$GITHUB_EVENT_PATH")"
            if [ "$commit_count" -eq 0 ]; then
              echo "No commits to scan"
              exit 0
            fi

            base_ref="$(jq -r '.commits[0].id' "$GITHUB_EVENT_PATH")"
            head_ref="$(jq -r '.commits[-1].id' "$GITHUB_EVENT_PATH")"
            if [ -n "${BASE_REF:-}" ]; then
              base_ref="$BASE_REF"
              echo "Overriding baseRef for scan with $BASE_REF."
            fi

            if [ "$base_ref" = "$head_ref" ]; then
              args+=(--log-opts=-1)
            else
              args+=(--log-opts="--no-merges --first-parent ${base_ref}^..${head_ref}")
            fi
          elif [ "$event_name" = "pull_request" ]; then
            pr_number="$(jq -r '.number' "$GITHUB_EVENT_PATH")"
            first_commit="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}/commits" --jq '.[0].sha')"
            last_commit="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}/commits" --jq '.[-1].sha')"
            base_ref="${BASE_REF:-$first_commit}"
            if [ -n "${BASE_REF:-}" ]; then
              echo "Overriding baseRef for scan with $BASE_REF."
            fi
            args+=(--log-opts="--no-merges --first-parent ${base_ref}^..${last_commit}")
          fi

          echo "gitleaks cmd: gitleaks ${args[*]}"
          gitleaks "${args[@]}"

  # ── Container image scanning ────────────────────────────────────
  container-scan:
    name: Container Scan (${{ matrix.image }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: agentctl-control-plane
            dockerfile: infra/docker/Dockerfile.control-plane
          - image: agentctl-agent-worker
            dockerfile: infra/docker/Dockerfile.agent-worker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          tags: ${{ matrix.image }}:audit
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan (SARIF)
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ matrix.image }}:audit
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: os,library

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: trivy-${{ matrix.image }}

      - name: Generate SBOM
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ matrix.image }}:audit
          format: cyclonedx
          output: sbom-${{ matrix.image }}.cdx.json

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.image }}
          path: sbom-${{ matrix.image }}.cdx.json
          retention-days: 90
