name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # Pin versions centrally so every job stays in sync
  PNPM_VERSION: "8.15.4"
  PRIMARY_NODE: "22"

jobs:
  # ---------------------------------------------------------------------------
  # Detect which packages changed (PRs only — main merges always run all)
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      control-plane: ${{ steps.filter.outputs.control-plane }}
      agent-worker: ${{ steps.filter.outputs.agent-worker }}
      mobile: ${{ steps.filter.outputs.mobile }}
      web: ${{ steps.filter.outputs.web }}
      infra: ${{ steps.filter.outputs.infra }}
      any-package: >-
        ${{
          steps.filter.outputs.shared == 'true'
          || steps.filter.outputs.control-plane == 'true'
          || steps.filter.outputs.agent-worker == 'true'
          || steps.filter.outputs.mobile == 'true'
          || steps.filter.outputs.web == 'true'
        }}
    steps:
      - uses: actions/checkout@v5

      - name: Detect changed files
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          shared=false
          control_plane=false
          agent_worker=false
          mobile=false
          web=false
          infra=false

          match_file() {
            local file="$1"

            case "$file" in
              packages/shared/*|tsconfig.base.json|pnpm-lock.yaml)
                shared=true
                control_plane=true
                agent_worker=true
                mobile=true
                web=true
                ;;
              packages/control-plane/*)
                control_plane=true
                ;;
              packages/agent-worker/*)
                agent_worker=true
                ;;
              packages/mobile/*)
                mobile=true
                ;;
              packages/web/*)
                web=true
                ;;
              infra/*|docker-compose*.yml)
                infra=true
                ;;
            esac
          }

          if [ "$EVENT_NAME" = "pull_request" ]; then
            page=1
            while :; do
              response="$(curl -fsSL \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER/files?per_page=100&page=$page")"

              files="$(echo "$response" | jq -r '.[].filename')"
              if [ -z "$files" ]; then
                break
              fi

              while IFS= read -r file; do
                [ -n "$file" ] || continue
                echo "Changed: $file"
                match_file "$file"
              done <<< "$files"

              if [ "$(echo "$response" | jq 'length')" -lt 100 ]; then
                break
              fi

              page=$((page + 1))
            done
          else
            echo "Non-PR event detected; main pushes always run the full pipeline."
          fi

          {
            echo "shared=$shared"
            echo "control-plane=$control_plane"
            echo "agent-worker=$agent_worker"
            echo "mobile=$mobile"
            echo "web=$web"
            echo "infra=$infra"
          } >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Install — single job that caches the full node_modules + pnpm store
  # for all downstream jobs to restore, eliminating repeated installs.
  # ---------------------------------------------------------------------------
  install:
    name: Install
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.PRIMARY_NODE }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Persist node_modules across jobs so downstream jobs skip `pnpm install`
      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            packages/shared/node_modules
            packages/control-plane/node_modules
            packages/agent-worker/node_modules
            packages/mobile/node_modules
            packages/web/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

  # ---------------------------------------------------------------------------
  # Lint — runs in parallel with build. Biome is fast; no build needed.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: install

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.PRIMARY_NODE }}
          cache: pnpm

      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/shared/node_modules
            packages/control-plane/node_modules
            packages/agent-worker/node_modules
            packages/mobile/node_modules
            packages/web/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      # Single Biome invocation covers all categories — no need for separate
      # "biome check" + "biome lint --rule-categories" steps.
      - name: Biome check (lint + format + suspicious rules)
        run: npx @biomejs/biome check packages/

  # ---------------------------------------------------------------------------
  # Build — compile TypeScript once; upload dist/ for the test job.
  # On PRs only changed packages are built. On main, all packages build.
  # Single Node version — the compat matrix runs separately below.
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [changes, install]
    if: >-
      github.event_name == 'push'
      || needs.changes.outputs.any-package == 'true'

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.PRIMARY_NODE }}
          cache: pnpm

      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/shared/node_modules
            packages/control-plane/node_modules
            packages/agent-worker/node_modules
            packages/mobile/node_modules
            packages/web/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      # Cache both .tsbuildinfo AND dist/ together — restoring only
      # .tsbuildinfo without dist/ causes tsc to skip compilation,
      # leaving dist/ empty and breaking downstream packages.
      - name: Restore TypeScript build cache
        uses: actions/cache@v5
        with:
          path: |
            packages/shared/.tsbuildinfo
            packages/shared/dist
            packages/control-plane/.tsbuildinfo
            packages/control-plane/dist
            packages/agent-worker/.tsbuildinfo
            packages/agent-worker/dist
            packages/mobile/.tsbuildinfo
            packages/mobile/dist
          key: tsbuildinfo-${{ runner.os }}-${{ hashFiles('packages/*/src/**/*.ts', 'tsconfig.base.json') }}
          restore-keys: |
            tsbuildinfo-${{ runner.os }}-

      # On main pushes: full build for safety
      - name: Build all packages
        if: github.event_name == 'push'
        run: pnpm build

      # On PRs: build only affected packages (shared always first if changed)
      - name: Build shared
        if: github.event_name == 'pull_request' && needs.changes.outputs.shared == 'true'
        run: pnpm --filter @agentctl/shared build

      - name: Build control-plane
        if: github.event_name == 'pull_request' && needs.changes.outputs.control-plane == 'true'
        run: pnpm --filter @agentctl/control-plane... build

      - name: Build agent-worker
        if: github.event_name == 'pull_request' && needs.changes.outputs.agent-worker == 'true'
        run: pnpm --filter @agentctl/agent-worker... build

      - name: Build mobile
        if: github.event_name == 'pull_request' && needs.changes.outputs.mobile == 'true'
        run: pnpm --filter @agentctl/mobile... build

      - name: Build web
        if: github.event_name == 'pull_request' && needs.changes.outputs.web == 'true'
        run: pnpm --filter @agentctl/web... build

      # Upload dist/ artifacts so the test job does not need to rebuild
      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dist-artifacts
          path: |
            packages/shared/dist
            packages/control-plane/dist
            packages/agent-worker/dist
            packages/mobile/dist
            packages/shared/.tsbuildinfo
            packages/control-plane/.tsbuildinfo
            packages/agent-worker/.tsbuildinfo
            packages/mobile/.tsbuildinfo
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Test — per-package matrix. Downloads build artifacts instead of rebuilding.
  # ---------------------------------------------------------------------------
  test:
    name: Test ${{ matrix.package }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [changes, build]

    strategy:
      fail-fast: false
      matrix:
        package: [shared, control-plane, agent-worker, mobile]
        exclude:
          # On PRs, exclude packages that did not change
          - package: ${{ needs.changes.outputs.shared != 'true' && github.event_name == 'pull_request' && 'shared' || 'SKIP_NONE' }}
          - package: ${{ needs.changes.outputs.control-plane != 'true' && github.event_name == 'pull_request' && 'control-plane' || 'SKIP_NONE' }}
          - package: ${{ needs.changes.outputs.agent-worker != 'true' && github.event_name == 'pull_request' && 'agent-worker' || 'SKIP_NONE' }}
          - package: ${{ needs.changes.outputs.mobile != 'true' && github.event_name == 'pull_request' && 'mobile' || 'SKIP_NONE' }}

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.PRIMARY_NODE }}
          cache: pnpm

      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/shared/node_modules
            packages/control-plane/node_modules
            packages/agent-worker/node_modules
            packages/mobile/node_modules
            packages/web/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      # Reuse build output from the build job — no second `pnpm build`
      # upload-artifact strips the longest common path prefix (packages/),
      # so we download into packages/ to restore the correct structure.
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: dist-artifacts
          path: packages

      - name: Restore Vitest cache
        uses: actions/cache@v5
        with:
          path: |
            packages/${{ matrix.package }}/node_modules/.vitest
          key: vitest-${{ runner.os }}-${{ matrix.package }}-${{ hashFiles(format('packages/{0}/src/**/*.ts', matrix.package), format('packages/{0}/vitest.config.*', matrix.package)) }}
          restore-keys: |
            vitest-${{ runner.os }}-${{ matrix.package }}-

      - name: Run tests with coverage
        run: pnpm --filter @agentctl/${{ matrix.package }} test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-${{ matrix.package }}
          path: packages/${{ matrix.package }}/coverage/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Node compat — lightweight build check on Node 20 (no tests, no coverage).
  # Runs in parallel with everything else so it does not block the pipeline.
  # ---------------------------------------------------------------------------
  node-compat:
    name: Node 20 compat
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    if: >-
      github.event_name == 'push'
      || needs.changes.outputs.any-package == 'true'

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

  # ---------------------------------------------------------------------------
  # Security — pnpm audit + Biome security rules + gitleaks
  # Runs fully in parallel with lint/build/test.
  # ---------------------------------------------------------------------------
  security:
    name: Security scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.PRIMARY_NODE }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Non-blocking: audit results appear as annotations, not failures
      - name: Dependency audit
        continue-on-error: true
        run: pnpm audit --audit-level=high

      # Non-blocking: surface Biome security-related lint warnings
      - name: Biome security lint
        continue-on-error: true
        run: npx @biomejs/biome lint --rule-categories=suspicious,security packages/

      # Secret scanning on PRs (full history on push to main)
      - name: Gitleaks secret scan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_VERSION: "8.30.0"
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C "$RUNNER_TEMP" gitleaks
          chmod +x "$RUNNER_TEMP/gitleaks"
          export PATH="$RUNNER_TEMP:$PATH"

          args=(
            detect
            --redact
            -v
            --exit-code=1
            --report-format=sarif
            --report-path=results.sarif
            --log-level=debug
          )

          event_name="${{ github.event_name }}"
          if [ "$event_name" = "push" ]; then
            commit_count="$(jq '.commits | length' "$GITHUB_EVENT_PATH")"
            if [ "$commit_count" -eq 0 ]; then
              echo "No commits to scan"
              exit 0
            fi

            base_ref="$(jq -r '.commits[0].id' "$GITHUB_EVENT_PATH")"
            head_ref="$(jq -r '.commits[-1].id' "$GITHUB_EVENT_PATH")"
            if [ -n "${BASE_REF:-}" ]; then
              base_ref="$BASE_REF"
              echo "Overriding baseRef for scan with $BASE_REF."
            fi

            if [ "$base_ref" = "$head_ref" ]; then
              args+=(--log-opts=-1)
            else
              args+=(--log-opts="--no-merges --first-parent ${base_ref}^..${head_ref}")
            fi
          elif [ "$event_name" = "pull_request" ]; then
            pr_number="$(jq -r '.number' "$GITHUB_EVENT_PATH")"
            first_commit="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}/commits" --jq '.[0].sha')"
            last_commit="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}/commits" --jq '.[-1].sha')"
            base_ref="${BASE_REF:-$first_commit}"
            if [ -n "${BASE_REF:-}" ]; then
              echo "Overriding baseRef for scan with $BASE_REF."
            fi
            args+=(--log-opts="--no-merges --first-parent ${base_ref}^..${last_commit}")
          fi

          echo "gitleaks cmd: gitleaks ${args[*]}"
          gitleaks "${args[@]}"
