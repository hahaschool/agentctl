name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------------
  # Detect which packages changed (PRs only — main merges always run all)
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      control-plane: ${{ steps.filter.outputs.control-plane }}
      agent-worker: ${{ steps.filter.outputs.agent-worker }}
      infra: ${{ steps.filter.outputs.infra }}
      any-package: >-
        ${{
          steps.filter.outputs.shared == 'true'
          || steps.filter.outputs.control-plane == 'true'
          || steps.filter.outputs.agent-worker == 'true'
        }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared:
              - 'packages/shared/**'
              - 'tsconfig.base.json'
              - 'pnpm-lock.yaml'
            control-plane:
              - 'packages/control-plane/**'
              - 'packages/shared/**'
              - 'tsconfig.base.json'
              - 'pnpm-lock.yaml'
            agent-worker:
              - 'packages/agent-worker/**'
              - 'packages/shared/**'
              - 'tsconfig.base.json'
              - 'pnpm-lock.yaml'
            infra:
              - 'infra/**'
              - 'docker-compose*.yml'

  # ---------------------------------------------------------------------------
  # Lint — always runs (Biome is fast, catches cross-package issues)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome lint check
        run: npx @biomejs/biome check packages/

      - name: Biome security lint
        run: npx @biomejs/biome lint --rule-categories=suspicious packages/

  # ---------------------------------------------------------------------------
  # Build — skip unchanged packages on PRs, full build on main
  # ---------------------------------------------------------------------------
  build:
    name: Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: >-
      github.event_name == 'push'
      || needs.changes.outputs.any-package == 'true'

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Cache TypeScript build info
        uses: actions/cache@v4
        with:
          path: |
            packages/shared/.tsbuildinfo
            packages/control-plane/.tsbuildinfo
            packages/agent-worker/.tsbuildinfo
          key: tsbuildinfo-${{ runner.os }}-node${{ matrix.node-version }}-${{ hashFiles('packages/*/src/**/*.ts', 'tsconfig.base.json') }}
          restore-keys: |
            tsbuildinfo-${{ runner.os }}-node${{ matrix.node-version }}-

      - name: Cache TypeScript build output
        uses: actions/cache@v4
        with:
          path: |
            packages/shared/dist
            packages/control-plane/dist
            packages/agent-worker/dist
          key: tsbuild-dist-${{ runner.os }}-node${{ matrix.node-version }}-${{ hashFiles('packages/*/src/**/*.ts', 'tsconfig.base.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            tsbuild-dist-${{ runner.os }}-node${{ matrix.node-version }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # On main pushes: full build for safety
      - name: Build all packages
        if: github.event_name == 'push'
        run: pnpm build

      # On PRs: build only affected packages (shared always first if changed)
      - name: Build shared
        if: github.event_name == 'pull_request' && needs.changes.outputs.shared == 'true'
        run: pnpm --filter @agentctl/shared build

      - name: Build control-plane
        if: github.event_name == 'pull_request' && needs.changes.outputs.control-plane == 'true'
        run: pnpm --filter @agentctl/control-plane... build

      - name: Build agent-worker
        if: github.event_name == 'pull_request' && needs.changes.outputs.agent-worker == 'true'
        run: pnpm --filter @agentctl/agent-worker... build

  # ---------------------------------------------------------------------------
  # Test — per-package matrix with path-filter optimization on PRs
  # ---------------------------------------------------------------------------
  test:
    name: Test ${{ matrix.package }} (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [changes, build]

    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
        package: [shared, control-plane, agent-worker]
        exclude:
          # On PRs, exclude packages that did not change
          - package: ${{ needs.changes.outputs.shared != 'true' && github.event_name == 'pull_request' && 'shared' || 'SKIP_NONE' }}
          - package: ${{ needs.changes.outputs.control-plane != 'true' && github.event_name == 'pull_request' && 'control-plane' || 'SKIP_NONE' }}
          - package: ${{ needs.changes.outputs.agent-worker != 'true' && github.event_name == 'pull_request' && 'agent-worker' || 'SKIP_NONE' }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Cache TypeScript build info
        uses: actions/cache@v4
        with:
          path: |
            packages/shared/.tsbuildinfo
            packages/control-plane/.tsbuildinfo
            packages/agent-worker/.tsbuildinfo
          key: tsbuildinfo-${{ runner.os }}-node${{ matrix.node-version }}-${{ hashFiles('packages/*/src/**/*.ts', 'tsconfig.base.json') }}
          restore-keys: |
            tsbuildinfo-${{ runner.os }}-node${{ matrix.node-version }}-

      - name: Cache TypeScript build output
        uses: actions/cache@v4
        with:
          path: |
            packages/shared/dist
            packages/control-plane/dist
            packages/agent-worker/dist
          key: tsbuild-dist-${{ runner.os }}-node${{ matrix.node-version }}-${{ hashFiles('packages/*/src/**/*.ts', 'tsconfig.base.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            tsbuild-dist-${{ runner.os }}-node${{ matrix.node-version }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (required for tests)
        run: pnpm build

      - name: Run tests with coverage
        run: pnpm --filter @agentctl/${{ matrix.package }} test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.package }}-node${{ matrix.node-version }}
          path: packages/${{ matrix.package }}/coverage/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Security — pnpm audit + Biome security rules + gitleaks
  # ---------------------------------------------------------------------------
  security:
    name: Security scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Non-blocking: audit results appear as annotations, not failures
      - name: Dependency audit
        continue-on-error: true
        run: pnpm audit --audit-level=high

      # Non-blocking: surface Biome security-related lint warnings
      - name: Biome security lint
        continue-on-error: true
        run: npx @biomejs/biome lint --rule-categories=suspicious,security packages/

      # Secret scanning on PRs (full history on push to main)
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
