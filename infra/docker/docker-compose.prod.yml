# Docker Compose — Production Deployment
#
# Builds and runs all AgentCTL services with production settings.
# Build context is the monorepo root (two levels up from this file).
#
# Usage:
#   cd infra/docker
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml down
#   docker compose -f docker-compose.prod.yml logs -f control-plane
#
# Required environment variables (set in .env or shell):
#   DATABASE_URL          — PostgreSQL connection string
#   REDIS_URL             — Redis connection string (defaults to internal redis)
#   ANTHROPIC_KEY_ORG1    — Anthropic API key (org 1)
#   ANTHROPIC_KEY_ORG2    — Anthropic API key (org 2)
#
# Security:
#   - All application containers run as non-root (uid 1001)
#   - All application containers use cap_drop: [ALL]
#   - Network isolation: agent-worker cannot reach the internet directly
#   - No --privileged or SYS_ADMIN capabilities

services:
  # ── Redis 7 ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agentctl-redis-prod
    volumes:
      - redis-data:/data
    command: >
      redis-server
        --appendonly yes
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --protected-mode yes
        --tcp-backlog 511
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 640M
          cpus: "1.0"
    networks:
      - backend

  # ── PostgreSQL 16 ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: agentctl-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentctl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-agentctl}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    command: >
      postgres
        -c shared_buffers=256MB
        -c work_mem=8MB
        -c maintenance_work_mem=128MB
        -c effective_cache_size=512MB
        -c log_statement=mod
        -c log_min_duration_statement=500
        -c max_connections=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentctl} -d ${POSTGRES_DB:-agentctl}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
    networks:
      - backend

  # ── Control Plane ────────────────────────────────────────────────
  control-plane:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.control-plane
    container_name: agentctl-control-plane
    ports:
      - "${CONTROL_PLANE_PORT:-8080}:8080"
    environment:
      NODE_ENV: production
      PORT: "8080"
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-agentctl}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agentctl}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64M
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - backend

  # ── Agent Worker ─────────────────────────────────────────────────
  agent-worker:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.agent-worker
    container_name: agentctl-agent-worker
    ports:
      - "${AGENT_WORKER_PORT:-9000}:9000"
    environment:
      NODE_ENV: production
      WORKER_PORT: "9000"
      WORKER_HOST: "0.0.0.0"
      CONTROL_URL: ${CONTROL_URL:-http://control-plane:8080}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MACHINE_ID: ${MACHINE_ID:-docker-worker-1}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      AUDIT_LOG_DIR: ${AUDIT_LOG_DIR:-/workspace/audit}
      IPC_DIR: ${IPC_DIR:-/workspace/ipc}
      PROJECT_PATH: ${PROJECT_PATH:-/workspace/project}
    volumes:
      # Workspace volume for git worktrees — writable by agentctl user
      - worker-workspace:/workspace
    depends_on:
      control-plane:
        condition: service_healthy
      redis:
        condition: service_healthy
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
    networks:
      - backend

# ── Named Volumes ────────────────────────────────────────────────
volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local
  worker-workspace:
    driver: local

# ── Networks ─────────────────────────────────────────────────────
# Internal network — no external access by default.
# Services that need external access (e.g., LiteLLM proxy) should be
# added to an additional network.
networks:
  backend:
    driver: bridge
    internal: true
